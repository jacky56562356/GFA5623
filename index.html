            <h2>Global Film Alliance (GFA) - Empowering Youth and Filmmakers</h2>
            <p><strong>U.S. 501(c)(3) Nonprofit</strong></p>
            <p>Welcome to the Global Film Alliance (GFA). We are a dedicated U.S. 501(c)(3) nonprofit organization headquartered in California. Our overarching mission is to foster the art of cinema by empowering youth and supporting emerging industry professionals. We believe that storytelling through film is a powerful educational tool that can change lives, build confidence, and create thriving communities.</p>
            <h3>Our Core Mission</h3>
            <p>Our mission is driven by a passionate commitment to make film production accessible to everyone, from young aspiring creators taking their first steps, to recent graduates navigating a challenging industry. We are dedicated to providing the necessary tools, educational mentorship, hands-on production experiences, and access to professional-grade equipment that often serve as high barriers to entry in the cinematic arts.</p>
            <h3>Our Four Major Programs</h3>
            <ul>
                <li><strong>Youth Film Camp:</strong> An interactive, hands-on learning environment where we introduce children and teenagers to the fundamentals of filmmaking. They learn scriptwriting, directing, acting, and editing, building creative confidence and teamwork skills.</li>
                <li><strong>Children Film Production:</strong> A program focused on helping young creators bring their stories to life by actively producing short films. We provide guidance from industry professionals and ensure a safe, collaborative space.</li>
                <li><strong>Film Graduate Support:</strong> Transitioning from film school to the professional industry is daunting. We assist recent graduates by offering camera gear grants, networking opportunities, and producing support for their debut features or shorts.</li>
                <li><strong>Golden Feather Award:</strong> Our flagship film festival initiative. The Golden Feather Award celebrates outstanding achievements in both youth filmmaking and emerging independent cinema. We spotlight diverse narratives from all over the world, bringing talented creators to the global stage.</li>
            </ul>
